name: review

on:
  push:
    branches: [harness-dev]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: review
  cancel-in-progress: false

jobs:
  review:
    runs-on: ubuntu-latest
    env:
      PR: "12"
    steps:
      - name: Mint app token
        id: app
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: FormalFrontier
          repositories: |
            TauCeti
            TauCetiReview

      - name: Checkout review repo (runner + rubrics)
        uses: actions/checkout@v4

      - name: Checkout roadmap (public)
        uses: actions/checkout@v4
        with:
          repository: FormalFrontier/TauCetiRoadmap
          path: roadmap

      - name: Resolve PR head and fetch diff
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
        run: |
          HEAD_SHA=$(gh pr view "$PR" --repo FormalFrontier/TauCeti --json headRefOid -q .headRefOid)
          echo "HEAD_SHA=$HEAD_SHA" >> "$GITHUB_ENV"
          gh pr diff "$PR" --repo FormalFrontier/TauCeti > diff.txt
          echo "diff lines: $(wc -l < diff.txt)"

      - name: Checkout code at PR head
        uses: actions/checkout@v4
        with:
          repository: FormalFrontier/TauCeti
          ref: ${{ env.HEAD_SHA }}
          token: ${{ steps.app.outputs.token }}
          path: code

      - name: Setup Node and review CLIs
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install Claude and Codex CLIs
        run: npm install -g @anthropic-ai/claude-code @openai/codex
      - name: Authenticate Codex with the API key
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: printf '%s' "$OPENAI_API_KEY" | codex login --with-api-key

      - name: Install Lean toolchain and fetch Mathlib (so reviewers can grep it)
        run: |
          curl https://elan.lean-lang.org/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.elan/bin:$PATH"
          ( cd code && lake exe cache get )
          PREFIX=$(cd code && lake env lean --print-prefix)
          LEAN_SRC="$PREFIX/src/lean"; [ -d "$LEAN_SRC" ] || LEAN_SRC=""
          echo "LEAN_SRC=$LEAN_SRC" >> "$GITHUB_ENV"
          echo "mathlib present: $(test -d code/.lake/packages/mathlib/Mathlib && echo yes || echo no); LEAN_SRC=$LEAN_SRC"

      - name: Run review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ steps.app.outputs.token }}
        run: |
          python3 runner/review.py \
            --repo FormalFrontier/TauCeti --pr "$PR" --round 1 \
            --rubrics "scope,correctness,reuse,proof-quality" \
            --rubrics-dir rubrics --tool-cwd "$PWD" \
            --code-path code --roadmap-path roadmap \
            --mathlib-path code/.lake/packages/mathlib --lean-src "$LEAN_SRC" \
            --diff-file diff.txt \
            --out-dir "reviews/$PR/1" --ledger reviews/ledger.json --daily-budget 5 \
            --provider-override codex

      - name: Upload review artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: review
          path: reviews/
